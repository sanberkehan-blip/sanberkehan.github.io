<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- PWA ve Mobil Uygulama Desteği -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Borç Defteri">
    <title>Borç Defteri</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --sat-height: env(safe-area-inset-top);
            --sab-height: env(safe-area-inset-bottom);
        }

        html, body {
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        #root { height: 100dvh; }

        .app-shell {
            display: grid;
            grid-template-rows: 64px 1fr 80px;
            height: 100dvh;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: white;
            position: relative;
        }

        .scroll-area {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        input, select { font-size: 16px !important; }
        
        .icon-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }

        .tab-active {
            color: #4f46e5;
            position: relative;
        }
        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: #4f46e5;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // İkon Bileşeni (DOM Çakışmasını Önleyen Wrapper)
        const Icon = ({ name, size = 24, className = "" }) => {
            const wrapperRef = useRef(null);
            useEffect(() => {
                if (window.lucide && wrapperRef.current) {
                    wrapperRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        attrs: { size, class: className },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);
            return <span ref={wrapperRef} className="icon-box"></span>;
        };

        const INITIAL_BOGALAR = [
            { id: 1, name: 'ALM', stock: 0 },
            { id: 2, name: 'AROW', stock: 0 },
            { id: 3, name: 'ASTOR', stock: 0 },
            { id: 4, name: 'BARON', stock: 0 }
        ];

        const INITIAL_VETS = ["Abdullah Yelekçi", "Adil Aygün", "Ahmet Arıcı", "Sinan Koç", "Yusuf Kara"];

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [selectedVet, setSelectedVet] = useState(null);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [showAddForm, setShowAddForm] = useState(false);
            const [showQuickAdd, setShowQuickAdd] = useState(null);
            const fileInputRef = useRef(null);
            
            // Veri Hafızası
            const [vets, setVets] = useState(() => JSON.parse(localStorage.getItem('v_vets_v5')) || INITIAL_VETS);
            const [products, setProducts] = useState(() => JSON.parse(localStorage.getItem('v_prods_v5')) || INITIAL_BOGALAR);
            const [transactions, setTransactions] = useState(() => JSON.parse(localStorage.getItem('v_trans_v5')) || []);

            useEffect(() => {
                localStorage.setItem('v_vets_v5', JSON.stringify(vets));
                localStorage.setItem('v_prods_v5', JSON.stringify(products));
                localStorage.setItem('v_trans_v5', JSON.stringify(transactions));
            }, [vets, products, transactions]);

            // Form State
            const [formVet, setFormVet] = useState('');
            const [formProduct, setFormProduct] = useState('');
            const [formQty, setFormQty] = useState('');
            const [formType, setFormType] = useState('borclanma');
            const [formDate, setFormDate] = useState(new Date().toISOString().split('T')[0]);
            const [newNameInput, setNewNameInput] = useState('');

            const stats = useMemo(() => {
                const vetMap = {};
                vets.forEach(v => vetMap[v] = { balance: 0, items: {} });
                transactions.forEach(t => {
                    if (vetMap[t.vet]) {
                        vetMap[t.vet].balance += t.qty;
                        vetMap[t.vet].items[t.product] = (vetMap[t.vet].items[t.product] || 0) + t.qty;
                    }
                });
                return vetMap;
            }, [transactions, vets]);

            const getVetStats = (vetName) => {
                const vetTrans = transactions.filter(t => t.vet === vetName);
                const balance = vetTrans.reduce((acc, t) => acc + t.qty, 0);
                const productBalances = {};
                vetTrans.forEach(t => {
                    productBalances[t.product] = (productBalances[t.product] || 0) + t.qty;
                });
                const items = Object.keys(productBalances)
                    .map(name => ({ name, balance: productBalances[name] }))
                    .filter(i => i.balance !== 0);
                return { balance, history: [...vetTrans].reverse(), productBalances: items };
            };

            const handleTransaction = () => {
                if (!formVet || !formProduct || !formQty) return;
                const qty = parseInt(formQty);
                const finalQty = formType === 'borclanma' ? qty : -qty;

                setTransactions([...transactions, { 
                    id: Date.now(), vet: formVet, product: formProduct, qty: finalQty, date: formDate, type: formType 
                }]);
                
                setProducts(products.map(p => 
                    p.name === formProduct ? { ...p, stock: formType === 'borclanma' ? p.stock - qty : p.stock + qty } : p
                ));
                
                setShowAddForm(false);
                setFormQty('');
                setFormDate(new Date().toISOString().split('T')[0]);
            };

            return (
                <div className="app-shell">
                    {/* Üst Başlık Çubuğu */}
                    <header className="bg-white px-5 flex items-center justify-between border-b border-slate-100 z-50 h-16">
                        <div className="flex items-center gap-3 overflow-hidden">
                            {(selectedVet || selectedProduct || activeTab !== 'home') && (
                                <button onClick={() => { setSelectedVet(null); setSelectedProduct(null); if(!selectedVet && !selectedProduct) setActiveTab('home'); }} className="p-2 active:bg-slate-50 rounded-full transition-all">
                                    <Icon name="chevron-left" size={24} className="text-slate-600" />
                                </button>
                            )}
                            <div>
                                <h1 className="text-lg font-extrabold text-slate-900 truncate tracking-tight">
                                    {selectedVet || (selectedProduct ? selectedProduct.name : activeTab === 'settings' ? 'Veri Yönetimi' : activeTab === 'vets' ? 'Müşteri Listesi' : activeTab === 'stock' ? 'Mevcut Durum' : 'Borç Defteri')}
                                </h1>
                            </div>
                        </div>
                        <button onClick={() => setActiveTab('settings')} className={`p-2 transition-all ${activeTab === 'settings' ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <Icon name="database" size={20}/>
                        </button>
                    </header>

                    {/* Kaydırılabilir İçerik */}
                    <main className="scroll-area no-scrollbar p-5 bg-white">
                        {activeTab === 'settings' ? (
                            <div className="space-y-4 animate-in fade-in">
                                <div className="p-6 bg-slate-50 rounded-[2rem] border border-slate-100 space-y-4 shadow-sm">
                                    <h3 className="font-bold text-slate-800 px-1">Yedekleme İşlemleri</h3>
                                    <button onClick={() => {
                                        const data = {vets, products, transactions};
                                        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                                        const link = document.createElement('a');
                                        link.href = URL.createObjectURL(blob);
                                        link.download = `defter_yedek.json`;
                                        link.click();
                                    }} className="w-full flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-200 font-bold active:bg-slate-50 transition-all text-indigo-600">
                                        <div className="flex items-center gap-3"><Icon name="download" size={20}/> Yedek Al</div>
                                        <Icon name="chevron-right" size={16} className="text-slate-300"/>
                                    </button>
                                    <button onClick={() => fileInputRef.current.click()} className="w-full flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-200 font-bold active:bg-slate-50 transition-all text-emerald-600">
                                        <div className="flex items-center gap-3"><Icon name="upload" size={20}/> Yedekten Yükle</div>
                                        <Icon name="chevron-right" size={16} className="text-slate-300"/>
                                    </button>
                                    <input type="file" ref={fileInputRef} onChange={(e) => {
                                        const file = e.target.files[0];
                                        if(!file) return;
                                        const reader = new FileReader();
                                        reader.onload = (event) => {
                                            try {
                                                const content = JSON.parse(event.target.result);
                                                if(content.vets) {
                                                    setVets(content.vets);
                                                    setProducts(content.products);
                                                    setTransactions(content.transactions);
                                                    alert("Geri yükleme başarılı!");
                                                }
                                            } catch (err) { alert("Hatalı dosya!"); }
                                        };
                                        reader.readAsText(file);
                                    }} className="hidden" accept=".json"/>
                                </div>
                            </div>
                        ) : selectedVet ? (
                            <div className="space-y-6 animate-in slide-in-from-right pb-10">
                                <div className="p-8 bg-indigo-600 rounded-[2.5rem] text-center text-white shadow-xl relative overflow-hidden">
                                    <h2 className="text-2xl font-black">{selectedVet}</h2>
                                    <p className="text-[10px] font-bold opacity-60 uppercase tracking-widest mt-6">Net Bakiye</p>
                                    <p className="text-6xl font-black mt-2 leading-none">{stats[selectedVet]?.balance > 0 ? `+${stats[selectedVet].balance}` : stats[selectedVet].balance}</p>
                                </div>

                                <div className="space-y-3">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2 flex items-center gap-2"><Icon name="box" size={14}/> Ürün Dağılımı</h3>
                                    {getVetStats(selectedVet).productBalances.map((item) => (
                                        <div key={item.name} className="flex justify-between p-5 bg-slate-50 border border-slate-100 rounded-3xl shadow-sm">
                                            <span className="font-bold text-slate-700">{item.name}</span>
                                            <span className={`font-black ${item.balance > 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{item.balance > 0 ? `+${item.balance}` : item.balance}</span>
                                        </div>
                                    ))}
                                </div>

                                <div className="space-y-3">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2 flex items-center gap-2"><Icon name="history" size={14}/> İşlem Geçmişi</h3>
                                    {getVetStats(selectedVet).history.map(t => (
                                        <div key={t.id} className="bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm">
                                            <div className="flex items-center gap-3 overflow-hidden text-left">
                                                <div className={`p-2 rounded-xl shrink-0 ${t.qty > 0 ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'}`}>
                                                    <Icon name={t.qty > 0 ? "arrow-up-right" : "arrow-down-left"} size={20}/>
                                                </div>
                                                <div className="overflow-hidden">
                                                    <p className="text-sm font-bold text-slate-800 truncate">{t.product}</p>
                                                    <p className="text-[10px] text-slate-400 font-bold">{t.date}</p>
                                                </div>
                                            </div>
                                            <span className={`font-black text-lg shrink-0 ml-2 ${t.qty > 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{t.qty > 0 ? `+${t.qty}` : t.qty}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in fade-in pb-10">
                                {activeTab === 'home' && (
                                    <div className="space-y-6">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div onClick={() => setActiveTab('stock')} className="p-5 bg-slate-900 rounded-[2.2rem] text-white shadow-lg active:scale-95 transition-transform">
                                                <Icon name="package" className="opacity-40 mb-2" size={24}/>
                                                <p className="text-[10px] font-bold opacity-60 uppercase mb-1">Depo Mevcut</p>
                                                <p className="text-3xl font-black tracking-tight">{products.reduce((a,b)=>a+b.stock,0)}</p>
                                            </div>
                                            <div onClick={() => setActiveTab('vets')} className="p-5 bg-indigo-600 rounded-[2.2rem] text-white shadow-lg active:scale-95 transition-transform text-center">
                                                <Icon name="users" className="opacity-40 mb-2" size={24}/>
                                                <p className="text-[10px] font-bold opacity-60 uppercase mb-1">Müşteriler</p>
                                                <p className="text-3xl font-black tracking-tight">{vets.length}</p>
                                            </div>
                                        </div>
                                        <div className="bg-slate-50 p-6 rounded-[2.2rem] border border-slate-100">
                                            <h2 className="font-extrabold text-slate-800 text-lg mb-6 flex items-center gap-2"><Icon name="alert-circle" size={20} className="text-rose-500"/> Borçlu Listesi</h2>
                                            <div className="space-y-3">
                                                {vets.map(v => ({ name: v, bal: stats[v]?.balance || 0 }))
                                                    .filter(v => v.bal > 0).sort((a,b)=>b.bal-a.bal).slice(0,4).map((v) => (
                                                    <div key={v.name} onClick={() => setSelectedVet(v.name)} className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100 active:bg-slate-50 transition-all">
                                                        <span className="font-bold text-slate-700">{v.name}</span>
                                                        <div className="bg-rose-50 px-3 py-1 rounded-full"><span className="font-black text-rose-600">+{v.bal}</span></div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <button onClick={() => setShowAddForm(true)} className="w-full bg-slate-900 text-white p-6 rounded-[2rem] flex items-center justify-center gap-4 shadow-xl active:scale-95 transition-all">
                                            <Icon name="plus-circle" size={24}/>
                                            <span className="font-black text-lg uppercase tracking-tight">Yeni Kayıt İşle</span>
                                        </button>
                                    </div>
                                )}
                                {activeTab === 'stock' && (
                                    <div className="space-y-4">
                                        <button onClick={() => setShowQuickAdd('product')} className="w-full p-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold flex items-center justify-center gap-2 active:bg-slate-50 transition-all"><Icon name="plus" size={18}/> Yeni Ürün</button>
                                        {products.map(p => (
                                            <div key={p.id} onClick={() => setSelectedProduct(p)} className="p-5 bg-slate-50 rounded-3xl flex items-center justify-between border border-slate-100 shadow-sm active:bg-slate-100">
                                                <div className="flex items-center gap-4 text-left"><div className="w-10 h-10 rounded-xl bg-slate-900 text-white flex items-center justify-center font-bold text-xs uppercase shrink-0">{p.name[0]}</div><p className="font-bold text-slate-800 uppercase truncate">{p.name}</p></div>
                                                <p className="text-2xl font-black text-indigo-600 shrink-0">{p.stock}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {activeTab === 'vets' && (
                                    <div className="space-y-3">
                                        <button onClick={() => setShowQuickAdd('vet')} className="w-full p-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold flex items-center justify-center gap-2 active:bg-slate-50 transition-all"><Icon name="user-plus" size={18}/> Yeni Müşteri</button>
                                        {vets.map(v => (
                                            <div key={v} onClick={() => setSelectedVet(v)} className="p-5 bg-slate-50 rounded-3xl flex items-center justify-between border border-slate-100 shadow-sm active:bg-slate-100">
                                                <div className="flex items-center gap-4 text-left"><div className="w-10 h-10 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold uppercase shrink-0">{v[0]}</div><p className="font-bold text-slate-800 truncate">{v}</p></div>
                                                <p className={`text-lg font-black shrink-0 ${stats[v]?.balance > 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{stats[v]?.balance > 0 ? `+${stats[v].balance}` : stats[v].balance}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {activeTab === 'history' && (
                                    <div className="space-y-3">
                                        {transactions.slice().reverse().map(t => (
                                            <div key={t.id} className="bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm transition-all active:scale-[0.98]">
                                                <div className="flex items-center gap-3 overflow-hidden text-left">
                                                    <div className={`p-2 rounded-xl shrink-0 ${t.qty > 0 ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'}`}><Icon name={t.qty > 0 ? "arrow-up-right" : "arrow-down-left"} size={20}/></div>
                                                    <div className="overflow-hidden">
                                                        <p className="text-sm font-bold text-slate-900 truncate">{t.vet}</p>
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{t.product} • {t.date}</p>
                                                    </div>
                                                </div>
                                                <span className={`font-black text-lg shrink-0 ml-2 ${t.qty > 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{t.qty > 0 ? `+${t.qty}` : t.qty}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Alt Navigasyon Menüsü */}
                    <nav className="bg-white border-t border-slate-100 h-20 shrink-0 flex justify-around items-center px-4 shadow-[0_-15px_40px_rgba(0,0,0,0.04)] z-50">
                        <button onClick={() => { setActiveTab('home'); setSelectedVet(null); setSelectedProduct(null); }} className={`p-4 transition-all duration-200 ${activeTab === 'home' && !selectedVet && !selectedProduct ? 'tab-active' : 'text-slate-300'}`}><Icon name="layout-dashboard" size={26}/></button>
                        <button onClick={() => { setActiveTab('stock'); setSelectedVet(null); setSelectedProduct(null); }} className={`p-4 transition-all duration-200 ${activeTab === 'stock' ? 'tab-active' : 'text-slate-300'}`}><Icon name="package" size={26}/></button>
                        <button onClick={() => { setActiveTab('vets'); setSelectedVet(null); setSelectedProduct(null); }} className={`p-4 transition-all duration-200 ${activeTab === 'vets' ? 'tab-active' : 'text-slate-300'}`}><Icon name="users" size={26}/></button>
                        <button onClick={() => { setActiveTab('history'); setSelectedVet(null); setSelectedProduct(null); }} className={`p-4 transition-all duration-200 ${activeTab === 'history' ? 'tab-active' : 'text-slate-300'}`}><Icon name="clipboard-list" size={26}/></button>
                    </nav>

                    {/* MODAL: YENİ KAYIT (DEPO GİRİŞİ SİLİNDİ) */}
                    {showAddForm && (
                        <div className="fixed inset-0 bg-slate-900/80 z-[100] flex items-end backdrop-blur-sm p-0 m-0 transition-opacity">
                            <div className="bg-white w-full rounded-t-[3rem] p-8 shadow-2xl animate-in slide-in-from-bottom duration-500 max-h-[95dvh] overflow-y-auto pb-safe">
                                <div className="w-16 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
                                <h3 className="text-2xl font-black text-slate-800 mb-8 flex items-center gap-3"><Icon name="edit-3" size={24} className="text-indigo-600"/> Cari İşlem Gir</h3>
                                
                                <div className="space-y-5">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-extrabold text-slate-400 uppercase ml-2 tracking-widest text-center block">Tarih</label>
                                        <input type="date" className="w-full p-5 bg-slate-100 border-none rounded-[1.5rem] font-bold outline-none text-center" value={formDate} onChange={e => setFormDate(e.target.value)} />
                                    </div>
                                    <div className="space-y-1 text-left">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Müşteri Seçiniz</label>
                                        <select className="w-full p-5 bg-slate-100 border-none rounded-[1.5rem] font-bold outline-none appearance-none shadow-inner" value={formVet} onChange={e => setFormVet(e.target.value)}>
                                            <option value="">Seçiniz</option>
                                            {vets.map((v) => <option key={v} value={v}>{v}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-1 text-left">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Ürün Seçiniz</label>
                                        <select className="w-full p-5 bg-slate-100 border-none rounded-[1.5rem] font-bold outline-none appearance-none shadow-inner" value={formProduct} onChange={e => setFormProduct(e.target.value)}>
                                            <option value="">Ürün Seçiniz</option>
                                            {products.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1 text-left">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Miktar</label>
                                            <input type="number" className="w-full p-5 bg-slate-100 border-none rounded-[1.5rem] font-black text-center" placeholder="0" value={formQty} onChange={e => setFormQty(e.target.value)}/>
                                        </div>
                                        <div className="space-y-1 text-left">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Tür</label>
                                            <select className="w-full p-5 bg-slate-100 border-none rounded-[1.5rem] font-bold text-indigo-600 text-center shadow-inner appearance-none" value={formType} onChange={e => setFormType(e.target.value)}>
                                                <option value="borclanma">BORÇLANMA (+)</option>
                                                <option value="odeme">ÖDEME (-)</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex gap-4 pt-6 pb-4">
                                        <button onClick={() => setShowAddForm(false)} className="flex-1 bg-slate-50 p-5 rounded-[1.5rem] font-bold text-slate-400 active:bg-slate-100 transition-colors">Vazgeç</button>
                                        <button onClick={handleTransaction} className="flex-[2] bg-indigo-600 text-white p-5 rounded-[1.5rem] font-black shadow-xl uppercase tracking-tight transition-transform active:scale-95">Tamamla</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Hızlı Ekleme Modalları */}
                    {showQuickAdd && (
                        <div className="fixed inset-0 bg-slate-900/80 z-[110] flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-white w-full rounded-[32px] p-8 shadow-2xl animate-in zoom-in transition-all">
                                <h3 className="text-xl font-black mb-6 text-slate-800">{showQuickAdd === 'vet' ? 'Yeni Müşteri' : 'Yeni Ürün'}</h3>
                                <input type="text" className="w-full p-5 bg-slate-100 border-none rounded-[1.5rem] mb-8 font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 transition-all" placeholder="Adı giriniz..." value={newNameInput} onChange={e => setNewNameInput(e.target.value)}/>
                                <div className="flex gap-3">
                                    <button onClick={() => {setShowQuickAdd(null); setNewNameInput('');}} className="flex-1 py-4 bg-slate-50 rounded-2xl font-bold text-slate-400 active:bg-slate-100">İptal</button>
                                    <button onClick={() => {
                                        if(!newNameInput.trim()) return;
                                        const cleanName = newNameInput.trim().toUpperCase();
                                        if(showQuickAdd === 'vet') {
                                            if(!vets.includes(cleanName)) setVets([...vets, cleanName]);
                                        } else {
                                            if(!products.some(p => p.name === cleanName)) setProducts([...products, { id: Date.now(), name: cleanName, stock: 0 }]);
                                        }
                                        setShowQuickAdd(null); setNewNameInput('');
                                    }} className="flex-[2] py-4 bg-slate-900 text-white rounded-2xl font-black shadow-lg uppercase transition-transform active:scale-95">Ekle</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
