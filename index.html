<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA / Mobil -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Borç Defteri" />
  <title>Borç Defteri</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    :root { 
      --sat-height: env(safe-area-inset-top); 
      --sab-height: env(safe-area-inset-bottom); 
    }

    html, body {
      height: 100dvh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #f8fafc;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    #root { height: 100dvh; }

    .app-shell {
      display: grid;
      grid-template-rows: 56px 1fr 68px;
      height: 100dvh;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      background: white;
      position: relative;
    }

    .scroll-area { 
      overflow-y: auto; 
      -webkit-overflow-scrolling: touch; 
      padding-bottom: 20px;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    input, select, textarea { font-size: 16px !important; }

    .icon-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
    }

    .tab-active { color: #4f46e5; position: relative; }
    .tab-active::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 50%;
      transform: translateX(-50%);
      width: 5px; height: 5px;
      background: #4f46e5;
      border-radius: 50%;
    }

    @media (max-width: 480px) {
      html { font-size: 14px; }
      .app-shell { grid-template-rows: 50px 1fr 64px; }
    }

    .animate-in {
      animation: fadeIn 0.25s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useMemo, useRef } = React;

  const Icon = ({ name, size = 20, className = "" }) => {
    const wrapperRef = useRef(null);
    useEffect(() => {
      if (window.lucide && wrapperRef.current) {
        wrapperRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
        window.lucide.createIcons({
          attrs: { size, class: className },
          nameAttr: 'data-lucide'
        });
      }
    }, [name, size, className]);
    return <span ref={wrapperRef} className="icon-box"></span>;
  };

  const INITIAL_PRODUCTS = [
    { id: 1, name: 'ALM', stock: 0 },
    { id: 2, name: 'AROW', stock: 0 },
    { id: 3, name: 'ASTOR', stock: 0 },
    { id: 4, name: 'BARON', stock: 0 }
  ];

  const INITIAL_VETS_LEGACY = ["Abdullah Yelekçi", "Adil Aygün", "Ahmet Arıcı", "Sinan Koç", "Yusuf Kara"];

  const normalizeName = (s) => (s || '').trim().toUpperCase();
  const formatPhone = (s) => (s || '').trim();
  const uid = () => Date.now() + Math.floor(Math.random() * 1000);

  const App = () => {
    const [activeTab, setActiveTab] = useState('home');
    const [selectedVetId, setSelectedVetId] = useState(null);
    const [selectedProductId, setSelectedProductId] = useState(null);
    
    const [showAddForm, setShowAddForm] = useState(false);
    const [showQuickAdd, setShowQuickAdd] = useState(null);
    const [vetSearch, setVetSearch] = useState('');
    
    const [editingVetId, setEditingVetId] = useState(null);
    const [editVetName, setEditVetName] = useState('');
    const [editVetPhone, setEditVetPhone] = useState('');
    const [editVetLimit, setEditVetLimit] = useState('');

    const [editingProductId, setEditingProductId] = useState(null);
    const [editProductName, setEditProductName] = useState('');

    const [openVetMenuId, setOpenVetMenuId] = useState(null);
    const [openProductMenuId, setOpenProductMenuId] = useState(null);
    const [openTransMenuId, setOpenTransMenuId] = useState(null);
    const [editingTransId, setEditingTransId] = useState(null);

    const [confirmDelete, setConfirmDelete] = useState({ open: false, type: '', id: null, message: '' });

    const fileInputRef = useRef(null);

    const [vets, setVets] = useState(() => {
      const stored = JSON.parse(localStorage.getItem('v_vets_v6'));
      return stored || INITIAL_VETS_LEGACY.map(v => ({ id: uid(), name: normalizeName(v), phone: '', limit: 0 }));
    });

    const [products, setProducts] = useState(() => {
      const stored = JSON.parse(localStorage.getItem('v_prods_v6'));
      return stored || INITIAL_PRODUCTS;
    });

    const [transactions, setTransactions] = useState(() => {
      const stored = JSON.parse(localStorage.getItem('v_trans_v6'));
      return stored || [];
    });

    useEffect(() => {
      localStorage.setItem('v_vets_v6', JSON.stringify(vets));
      localStorage.setItem('v_prods_v6', JSON.stringify(products));
      localStorage.setItem('v_trans_v6', JSON.stringify(transactions));
    }, [vets, products, transactions]);

    useEffect(() => {
      const onDoc = () => { setOpenVetMenuId(null); setOpenProductMenuId(null); setOpenTransMenuId(null); };
      document.addEventListener('click', onDoc);
      return () => document.removeEventListener('click', onDoc);
    }, []);

    const [formVetId, setFormVetId] = useState('');
    const [formProduct, setFormProduct] = useState('');
    const [formQty, setFormQty] = useState('');
    const [formType, setFormType] = useState('borclanma');
    const [formDate, setFormDate] = useState(new Date().toISOString().split('T')[0]);

    const [newNameInput, setNewNameInput] = useState('');
    const [newPhoneInput, setNewPhoneInput] = useState('');
    const [newLimitInput, setNewLimitInput] = useState('');

    const stats = useMemo(() => {
      const map = {};
      vets.forEach(v => map[v.id] = { balance: 0 });
      transactions.forEach(t => {
        if (map[t.vetId]) map[t.vetId].balance += Number(t.qty);
      });
      return map;
    }, [transactions, vets]);

    const selectedVet = useMemo(() => vets.find(v => v.id === selectedVetId) || null, [vets, selectedVetId]);
    const selectedProduct = useMemo(() => products.find(p => p.id === selectedProductId) || null, [products, selectedProductId]);

    // Detay İstatistikleri (Loose equality == kullanıldı ID eşleşmesi için)
    const getVetStats = (vId) => {
      const vetTrans = transactions.filter(t => t.vetId == vId);
      const balance = vetTrans.reduce((acc, t) => acc + Number(t.qty), 0);
      const productBalances = {};
      vetTrans.forEach(t => { productBalances[t.product] = (productBalances[t.product] || 0) + Number(t.qty); });
      const items = Object.keys(productBalances).map(name => ({ name, balance: productBalances[name] })).filter(i => i.balance !== 0);
      return { balance, history: [...vetTrans].reverse(), productBalances: items };
    };

    const getProductStats = (prodName) => {
      const prodTrans = transactions.filter(t => t.product === prodName);
      const vetBalances = {};
      prodTrans.forEach(t => { vetBalances[t.vetId] = (vetBalances[t.vetId] || 0) + Number(t.qty); });
      const items = Object.keys(vetBalances).map(vId => ({ 
        name: vets.find(v => v.id == vId)?.name || 'Bilinmeyen Müşteri', 
        id: vId,
        balance: vetBalances[vId] 
      })).filter(i => i.balance !== 0);
      return { history: [...prodTrans].reverse(), vetBalances: items };
    };

    const handleTransaction = () => {
      if (!formVetId || !formProduct || !formQty) return;
      const qty = parseInt(formQty, 10);
      const finalQty = formType === 'borclanma' ? qty : -qty;
      
      if (editingTransId) {
        const oldT = transactions.find(t => t.id === editingTransId);
        const revertedProducts = products.map(p => p.name === oldT.product ? { ...p, stock: p.stock - Number(oldT.qty) } : p);
        const updatedProducts = revertedProducts.map(p => p.name === formProduct ? { ...p, stock: p.stock + finalQty } : p);
        setProducts(updatedProducts);
        setTransactions(transactions.map(t => t.id === editingTransId ? { ...t, vetId: formVetId, product: formProduct, qty: finalQty, date: formDate, type: formType } : t));
        setEditingTransId(null);
      } else {
        setTransactions([...transactions, { id: uid(), vetId: formVetId, product: formProduct, qty: finalQty, date: formDate, type: formType }]);
        setProducts(products.map(p => p.name === formProduct ? { ...p, stock: p.stock + finalQty } : p));
      }
      setShowAddForm(false);
      resetForm();
    };

    const resetForm = () => {
      setFormVetId(''); setFormProduct(''); setFormQty('');
      setFormType('borclanma'); setFormDate(new Date().toISOString().split('T')[0]);
      setEditingTransId(null);
    };

    const deleteTransaction = (id) => {
      const t = transactions.find(x => x.id === id);
      if (!t) return;
      setProducts(products.map(p => p.name === t.product ? { ...p, stock: p.stock - Number(t.qty) } : p));
      setTransactions(transactions.filter(x => x.id !== id));
      setOpenTransMenuId(null);
    };

    const openEditTransaction = (t) => {
      setEditingTransId(t.id);
      setFormVetId(t.vetId);
      setFormProduct(t.product);
      setFormQty(Math.abs(t.qty).toString());
      setFormType(t.qty > 0 ? 'borclanma' : 'odeme');
      setFormDate(t.date);
      setShowAddForm(true);
      setOpenTransMenuId(null);
    };

    // GERİ BUTONU MANTIĞI
    const handleBack = () => {
      if (selectedVetId || selectedProductId) {
        setSelectedVetId(null);
        setSelectedProductId(null);
      } else if (activeTab !== 'home') {
        setActiveTab('home');
      }
    };

    return (
      <div className="app-shell">
        <header className="bg-white px-4 flex items-center justify-between border-b border-slate-100 z-50">
          <div className="flex items-center gap-2 overflow-hidden text-left">
            {(selectedVetId || selectedProductId || activeTab !== 'home') && (
              <button onClick={handleBack} className="p-1.5 active:bg-slate-50 rounded-full">
                <Icon name="chevron-left" size={22} className="text-slate-600" />
              </button>
            )}
            <h1 className="text-base font-bold text-slate-900 truncate">
              {selectedVet ? selectedVet.name : (selectedProduct ? selectedProduct.name : (activeTab === 'settings' ? 'Ayarlar' : activeTab === 'vets' ? 'Müşteriler' : activeTab === 'stock' ? 'Ürünler' : activeTab === 'history' ? 'Geçmiş' : 'Borç Defteri'))}
            </h1>
          </div>
          <button onClick={() => { setActiveTab('settings'); setSelectedVetId(null); setSelectedProductId(null); }} className={`p-2 ${activeTab === 'settings' ? 'text-indigo-600' : 'text-slate-400'}`}>
            <Icon name="settings" size={18} />
          </button>
        </header>

        <main className="scroll-area no-scrollbar p-4 bg-white">
          {activeTab === 'settings' && !selectedVetId && !selectedProductId && (
            <div className="space-y-4 animate-in">
              <div className="p-5 bg-slate-50 rounded-2xl border border-slate-100 space-y-4 shadow-sm">
                <h3 className="font-bold text-slate-800 text-sm">Veri Yönetimi</h3>
                <div className="space-y-2">
                  <button onClick={() => {
                      const data = { vets, products, transactions };
                      const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                      const link = document.createElement('a');
                      link.href = URL.createObjectURL(blob);
                      link.download = `borc_defteri_yedek.json`; link.click();
                    }} className="w-full flex items-center justify-between p-4 bg-white rounded-xl border border-slate-200 font-bold text-indigo-600 text-xs">
                    <div className="flex items-center gap-3"><Icon name="download" size={18} /> Verileri Yedekle</div>
                    <Icon name="chevron-right" size={14} />
                  </button>
                  <button onClick={() => fileInputRef.current.click()} className="w-full flex items-center justify-between p-4 bg-white rounded-xl border border-slate-200 font-bold text-emerald-600 text-xs">
                    <div className="flex items-center gap-3"><Icon name="upload" size={18} /> Yedekten Geri Yükle</div>
                    <Icon name="chevron-right" size={14} />
                  </button>
                  <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={(e) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                      try {
                        const c = JSON.parse(ev.target.result);
                        if (c.vets && c.products) { 
                          setVets(c.vets); setProducts(c.products); setTransactions(c.transactions || []); 
                          setConfirmDelete({ open: true, type: 'alert', message: "Veriler yüklendi!", onConfirm: null });
                        }
                      } catch(err) { alert("Dosya hatalı!"); }
                    };
                    if(e.target.files[0]) reader.readAsText(e.target.files[0]);
                  }} />
                </div>
              </div>
            </div>
          )}

          {/* MÜŞTERİ DETAY */}
          {selectedVet && (
            <div className="space-y-5 animate-in">
              <div className="p-6 bg-indigo-600 rounded-3xl text-center text-white shadow-lg relative">
                <div className="flex items-center justify-between mb-4">
                  <div className="text-left overflow-hidden">
                    <h2 className="text-xl font-extrabold truncate uppercase">{selectedVet.name}</h2>
                    {(selectedVet.phone || (selectedVet.limit > 0)) && (
                      <p className="text-[11px] font-medium opacity-80 truncate">
                        {selectedVet.phone && `${selectedVet.phone}`}
                        {selectedVet.phone && selectedVet.limit > 0 && " • "}
                        {selectedVet.limit > 0 && `Limit: ${selectedVet.limit}`}
                      </p>
                    )}
                  </div>
                  <button onClick={() => { setEditingVetId(selectedVet.id); setEditVetName(selectedVet.name); setEditVetPhone(selectedVet.phone); setEditVetLimit(selectedVet.limit); }} className="p-2.5 bg-white/20 rounded-xl shrink-0">
                    <Icon name="edit-3" size={18} className="text-white" />
                  </button>
                </div>
                <div className="py-2">
                  <p className="text-[10px] font-bold opacity-60 uppercase tracking-widest">NET BAKİYE</p>
                  <p className="text-5xl font-black mt-1">{stats[selectedVet.id]?.balance > 0 ? `+${stats[selectedVet.id].balance}` : (stats[selectedVet.id]?.balance || 0)}</p>
                </div>
              </div>

              <div className="space-y-2">
                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1 text-left">Ürün Dağılımı</h3>
                {getVetStats(selectedVet.id).productBalances.length === 0 ? (
                    <p className="p-4 bg-slate-50 rounded-xl text-slate-400 text-xs text-center font-bold italic">Müşteriye ait aktif ürün borcu bulunmuyor.</p>
                ) : getVetStats(selectedVet.id).productBalances.map(item => (
                  <div key={item.name} className="flex justify-between p-4 bg-slate-50 border border-slate-100 rounded-2xl shadow-sm">
                    <span className="font-bold text-slate-700 text-sm uppercase">{item.name}</span>
                    <span className={`font-black text-sm ${item.balance > 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{item.balance > 0 ? `+${item.balance}` : item.balance}</span>
                  </div>
                ))}
              </div>

              <div className="space-y-2">
                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1 text-left">Geçmiş</h3>
                {getVetStats(selectedVet.id).history.map(t => (
                  <div key={t.id} className="bg-white p-3 rounded-xl border border-slate-100 flex items-center justify-between shadow-sm">
                    <div className="flex items-center gap-3">
                      <div className={`p-1.5 rounded-lg shrink-0 ${t.qty > 0 ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'}`}>
                        <Icon name={t.qty > 0 ? "arrow-up-right" : "arrow-down-left"} size={16} />
                      </div>
                      <div className="text-left truncate">
                        <p className="text-xs font-bold text-slate-800 truncate uppercase">{t.product}</p>
                        <p className="text-[10px] text-slate-400 font-bold">{t.date}</p>
                      </div>
                    </div>
                    <span className={`font-black text-sm shrink-0 ml-2 ${t.qty > 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{t.qty > 0 ? `+${t.qty}` : t.qty}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ÜRÜN DETAY */}
          {selectedProduct && (
            <div className="space-y-5 animate-in text-left">
              <div className="p-6 bg-slate-900 rounded-3xl text-center text-white shadow-lg relative">
                <div className="flex items-center justify-between mb-4">
                  <div className="text-left">
                    <h2 className="text-xl font-extrabold uppercase">{selectedProduct.name}</h2>
                    <p className="text-[11px] font-medium opacity-80 uppercase tracking-tighter">Dışarıdaki Toplam Ürün</p>
                  </div>
                  <button onClick={() => { setEditingProductId(selectedProduct.id); setEditProductName(selectedProduct.name); }} className="p-2.5 bg-white/20 rounded-xl">
                    <Icon name="edit-3" size={18} className="text-white" />
                  </button>
                </div>
                <div className="py-2 text-center">
                  <p className="text-[10px] font-bold opacity-60 uppercase tracking-widest text-indigo-400">TOPLAM BORÇTAKİ</p>
                  <p className="text-5xl font-black mt-1 text-white">{selectedProduct.stock}</p>
                </div>
              </div>
              
              <div className="space-y-2">
                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Müşteri Dağılımı</h3>
                {getProductStats(selectedProduct.name).vetBalances.length === 0 ? (
                   <p className="p-4 bg-slate-50 rounded-xl text-slate-400 text-xs text-center font-bold italic">Borç kaydı bulunamadı.</p>
                ) : getProductStats(selectedProduct.name).vetBalances.map(item => (
                  <div key={item.id} onClick={() => { setSelectedProductId(null); setSelectedVetId(item.id); }} className="flex justify-between p-4 bg-slate-50 border border-slate-100 rounded-2xl active:bg-slate-100 shadow-sm">
                    <span className="font-bold text-slate-700 text-sm truncate uppercase">{item.name}</span>
                    <span className={`font-black text-sm ${item.balance > 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{item.balance > 0 ? `+${item.balance}` : item.balance}</span>
                  </div>
                ))}
              </div>

              <div className="space-y-2">
                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Ürün Hareketleri</h3>
                {getProductStats(selectedProduct.name).history.map(t => (
                  <div key={t.id} className="bg-white p-3 rounded-xl border border-slate-100 flex items-center justify-between shadow-sm">
                    <div className="flex items-center gap-3 overflow-hidden">
                      <div className={`p-1.5 rounded-lg shrink-0 ${t.qty > 0 ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'}`}>
                        <Icon name={t.qty > 0 ? "arrow-up-right" : "arrow-down-left"} size={16} />
                      </div>
                      <div className="text-left truncate">
                        <p className="text-xs font-bold text-slate-800 truncate uppercase">{vets.find(v => v.id == t.vetId)?.name || 'Bilinmeyen'}</p>
                        <p className="text-[10px] text-slate-400 font-bold">{t.date}</p>
                      </div>
                    </div>
                    <span className={`font-black text-sm shrink-0 ml-2 ${t.qty > 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{t.qty > 0 ? `+${t.qty}` : t.qty}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ANA SAYFA */}
          {activeTab === 'home' && !selectedVetId && !selectedProductId && (
            <div className="space-y-4 animate-in">
              <div className="grid grid-cols-2 gap-3 text-left">
                <div onClick={() => setActiveTab('stock')} className="p-4 bg-slate-900 rounded-2xl text-white shadow-sm active:scale-95 transition">
                  <Icon name="package" className="opacity-40 mb-1" size={18} />
                  <p className="text-[10px] font-bold opacity-60 uppercase tracking-wider">ÜRÜN</p>
                  <p className="text-xl font-black">{products.reduce((a, b) => a + Number(b.stock), 0)}</p>
                </div>
                <div onClick={() => setActiveTab('vets')} className="p-4 bg-indigo-600 rounded-2xl text-white shadow-sm active:scale-95 transition text-center">
                  <Icon name="users" className="opacity-40 mb-1" size={18} />
                  <p className="text-[10px] font-bold opacity-60 uppercase tracking-wider">MÜŞTERİ</p>
                  <p className="text-xl font-black">{vets.length}</p>
                </div>
              </div>
              <button onClick={() => { resetForm(); setShowAddForm(true); }} className="w-full bg-indigo-600 text-white p-5 rounded-2xl flex items-center justify-center gap-2 font-bold shadow-lg active:scale-[0.98] transition uppercase tracking-tight">
                <Icon name="plus-circle" size={20} /> Yeni İşlem Gir
              </button>
            </div>
          )}

          {/* ÜRÜNLER LİSTESİ */}
          {activeTab === 'stock' && !selectedProductId && (
            <div className="space-y-2 animate-in text-left">
              <button onClick={() => setShowQuickAdd('product')} className="w-full p-3 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-bold text-xs mb-2 active:bg-slate-50">+ Yeni Ürün Ekle</button>
              {products.map(p => (
                <div key={p.id} onClick={() => setSelectedProductId(p.id)} className="p-4 bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 relative shadow-sm">
                  <div className="flex items-center gap-3">
                    <div className="w-8 h-8 rounded-lg bg-slate-800 text-white flex items-center justify-center font-bold text-[10px] uppercase tracking-tighter">{p.name[0]}</div>
                    <p className="font-bold text-slate-700 text-sm uppercase">{p.name}</p>
                  </div>
                  <div className="flex items-center gap-3">
                    <p className="font-black text-indigo-600">{p.stock}</p>
                    <button onClick={(e) => { e.stopPropagation(); setOpenProductMenuId(openProductMenuId === p.id ? null : p.id); }} className="p-1">
                      <Icon name="more-vertical" size={16} className="text-slate-400" />
                    </button>
                  </div>
                  {openProductMenuId === p.id && (
                    <div className="absolute right-8 top-10 w-36 bg-white border border-slate-100 rounded-xl shadow-xl z-50 overflow-hidden animate-in" onClick={e => e.stopPropagation()}>
                      <button onClick={() => { setEditingProductId(p.id); setEditProductName(p.name); }} className="w-full p-3 text-left text-[11px] font-bold border-b flex items-center gap-2 active:bg-slate-50"><Icon name="edit" size={14}/> Düzenle</button>
                      <button onClick={() => {
                        if (p.stock !== 0) { setConfirmDelete({ open:true, type:'alert', message:'Dışarıda bakiyesi olan ürün silinemez.' }); return; }
                        setConfirmDelete({ open: true, type: 'product', id: p.id, message: `${p.name} ürününü silmek istediğinize emin misiniz?`, onConfirm: () => setProducts(products.filter(x => x.id !== p.id)) });
                      }} className="w-full p-3 text-left text-[11px] font-bold text-rose-500 flex items-center gap-2 active:bg-rose-50"><Icon name="trash" size={14}/> Sil</button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}

          {/* MÜŞTERİ LİSTESİ */}
          {activeTab === 'vets' && !selectedVetId && (
            <div className="space-y-2 animate-in text-left">
              <div className="flex gap-2 mb-3">
                <input value={vetSearch} onChange={e => setVetSearch(e.target.value)} placeholder="Müşteri ara..." className="flex-1 p-3 bg-slate-100 rounded-xl font-bold text-sm outline-none" />
                <button onClick={() => setShowQuickAdd('vet')} className="px-4 bg-slate-900 text-white rounded-xl active:scale-90 transition shrink-0"><Icon name="user-plus" size={18} /></button>
              </div>
              {vets.filter(v => normalizeName(v.name).includes(normalizeName(vetSearch))).map(v => (
                <div key={v.id} onClick={() => setSelectedVetId(v.id)} className="p-4 bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 relative shadow-sm">
                  <div className="flex items-center gap-3 truncate">
                    <div className="w-9 h-9 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-xs uppercase shrink-0">{v.name[0]}</div>
                    <div className="truncate">
                        <p className="font-bold text-slate-700 text-sm truncate uppercase">{v.name}</p>
                        {v.phone && <p className="text-[10px] font-bold text-slate-400 truncate">{v.phone}</p>}
                    </div>
                  </div>
                  <div className="flex items-center gap-2 shrink-0 ml-1">
                    <p className={`font-black ${stats[v.id]?.balance > 0 ? 'text-rose-600' : 'text-emerald-600'}`}>
                      {stats[v.id]?.balance > 0 ? `+${stats[v.id].balance}` : stats[v.id]?.balance}
                    </p>
                    <button onClick={(e) => { e.stopPropagation(); setOpenVetMenuId(openVetMenuId === v.id ? null : v.id); }} className="p-1">
                      <Icon name="more-vertical" size={16} className="text-slate-400" />
                    </button>
                  </div>
                  {openVetMenuId === v.id && (
                    <div className="absolute right-8 top-10 w-36 bg-white border border-slate-100 rounded-xl shadow-xl z-50 overflow-hidden animate-in" onClick={e => e.stopPropagation()}>
                      <button onClick={() => { setEditingVetId(v.id); setEditVetName(v.name); setEditVetPhone(v.phone); setEditVetLimit(v.limit); }} className="w-full p-3 text-left text-[11px] font-bold border-b flex items-center gap-2 active:bg-slate-50"><Icon name="edit" size={14}/> Düzenle</button>
                      <button onClick={() => {
                          if (stats[v.id]?.balance !== 0) { setConfirmDelete({ open:true, type:'alert', message:'Bakiyesi olan müşteri silinemez.' }); return; }
                          setConfirmDelete({ 
                            open: true, type: 'vet', id: v.id, 
                            message: `${v.name} müşterisini silmek istediğine emin misin?`,
                            onConfirm: () => { setVets(vets.filter(x => x.id !== v.id)); setTransactions(transactions.filter(t => t.vetId == v.id)); }
                          });
                      }} className="w-full p-3 text-left text-[11px] font-bold text-rose-500 flex items-center gap-2 active:bg-rose-50"><Icon name="trash" size={14}/> Sil</button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}

          {/* GEÇMİŞ TAB */}
          {activeTab === 'history' && (
            <div className="space-y-2 animate-in text-left">
              {transactions.slice().reverse().map(t => (
                <div key={t.id} className="p-3 bg-white border border-slate-100 rounded-xl flex items-center justify-between shadow-sm relative">
                  <div className="flex items-center gap-3 overflow-hidden text-left">
                    <div className={`p-1.5 rounded-lg shrink-0 ${t.qty > 0 ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'}`}>
                      <Icon name={t.qty > 0 ? "arrow-up-right" : "arrow-down-left"} size={16} />
                    </div>
                    <div className="truncate">
                      <p className="text-xs font-bold text-slate-800 truncate uppercase">{vets.find(v => v.id == t.vetId)?.name || 'Bilinmeyen'}</p>
                      <p className="text-[9px] text-slate-400 font-bold uppercase truncate">{t.product} • {t.date}</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-2 shrink-0">
                    <p className={`text-sm font-black ${t.qty > 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{t.qty > 0 ? `+${t.qty}` : t.qty}</p>
                    <button onClick={(e) => { e.stopPropagation(); setOpenTransMenuId(openTransMenuId === t.id ? null : t.id); }} className="p-1">
                      <Icon name="more-vertical" size={16} className="text-slate-400" />
                    </button>
                  </div>
                  {openTransMenuId === t.id && (
                    <div className="absolute right-8 top-10 w-36 bg-white border border-slate-100 rounded-xl shadow-xl z-50 overflow-hidden animate-in" onClick={e => e.stopPropagation()}>
                      <button onClick={() => openEditTransaction(t)} className="w-full p-3 text-left text-[11px] font-bold border-b flex items-center gap-2 active:bg-slate-50"><Icon name="edit" size={14}/> Düzenle</button>
                      <button onClick={() => {
                        setConfirmDelete({ open: true, type: 'trans', id: t.id, message: "İşlemi silmek istiyor musunuz?", onConfirm: () => deleteTransaction(t.id) });
                      }} className="w-full p-3 text-left text-[11px] font-bold text-rose-500 flex items-center gap-2 active:bg-rose-50"><Icon name="trash" size={14}/> Sil</button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </main>

        <nav className="bg-white border-t border-slate-100 flex justify-around items-center px-2 z-50 shadow-lg shrink-0">
          {[{id:'home', i:'layout-dashboard'}, {id:'stock', i:'package'}, {id:'vets', i:'users'}, {id:'history', i:'clipboard-list'}].map(t => (
            <button key={t.id} onClick={() => {setActiveTab(t.id); setSelectedVetId(null); setSelectedProductId(null);}} className={`p-4 transition-all ${activeTab === t.id && !selectedVetId && !selectedProductId ? 'tab-active' : 'text-slate-300'}`}>
              <Icon name={t.i} size={24} />
            </button>
          ))}
        </nav>

        {/* ONAY MODALI */}
        {confirmDelete.open && (
          <div className="fixed inset-0 bg-slate-900/60 z-[200] flex items-center justify-center p-6 backdrop-blur-sm animate-in">
            <div className="bg-white w-full rounded-2xl p-6 shadow-2xl max-w-sm">
              <div className={`w-12 h-12 ${confirmDelete.type === 'alert' ? 'bg-amber-50 text-amber-500' : 'bg-rose-50 text-rose-500'} rounded-full flex items-center justify-center mb-4 mx-auto`}>
                <Icon name={confirmDelete.type === 'alert' ? "alert-circle" : "alert-triangle"} size={28} />
              </div>
              <h3 className="text-center font-black text-slate-800 mb-2">{confirmDelete.type === 'alert' ? 'Bilgi' : 'Onay'}</h3>
              <p className="text-center text-slate-500 text-xs leading-relaxed mb-6">{confirmDelete.message}</p>
              <div className="flex gap-3">
                <button onClick={() => setConfirmDelete({ open: false })} className="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-slate-500 text-xs">{confirmDelete.type === 'alert' ? 'Tamam' : 'Vazgeç'}</button>
                {confirmDelete.type !== 'alert' && (
                  <button onClick={() => { confirmDelete.onConfirm(); setConfirmDelete({ open: false }); }} className="flex-1 py-3 bg-rose-600 text-white rounded-xl font-black text-xs uppercase text-center">SİL</button>
                )}
              </div>
            </div>
          </div>
        )}

        {/* DÜZENLEME MODALLARI */}
        {editingVetId && (
          <div className="fixed inset-0 bg-slate-900/60 z-[150] flex items-center justify-center p-5 backdrop-blur-sm">
            <div className="bg-white w-full rounded-2xl p-6 animate-in shadow-2xl">
              <h3 className="font-black text-slate-800 mb-4 text-sm uppercase">Müşteri Düzenle</h3>
              <input value={editVetName} onChange={e => setEditVetName(e.target.value)} className="w-full p-3 bg-slate-100 rounded-xl mb-2 font-bold text-sm outline-none uppercase" placeholder="İsim" />
              <div className="grid grid-cols-2 gap-2 mb-3">
                <input value={editVetPhone} onChange={e => setEditVetPhone(e.target.value)} className="p-3 bg-slate-100 rounded-xl font-bold text-xs outline-none" placeholder="Telefon" />
                <input type="number" value={editVetLimit} onChange={e => setEditVetLimit(e.target.value)} className="p-3 bg-slate-100 rounded-xl font-bold text-xs outline-none" placeholder="Limit" />
              </div>
              <div className="flex gap-2">
                <button onClick={() => setEditingVetId(null)} className="flex-1 p-3 bg-slate-100 rounded-xl font-bold text-xs text-slate-400">İptal</button>
                <button onClick={() => {
                  setVets(vets.map(v => v.id === editingVetId ? { ...v, name: normalizeName(editVetName), phone: editVetPhone, limit: Number(editVetLimit) } : v));
                  setEditingVetId(null);
                }} className="flex-1 p-3 bg-indigo-600 text-white rounded-xl font-black text-xs uppercase text-center">KAYDET</button>
              </div>
            </div>
          </div>
        )}

        {editingProductId && (
          <div className="fixed inset-0 bg-slate-900/60 z-[150] flex items-center justify-center p-5 backdrop-blur-sm">
            <div className="bg-white w-full rounded-2xl p-6 animate-in shadow-2xl text-left">
              <h3 className="font-black text-slate-800 mb-4 text-sm uppercase">Ürün Düzenle</h3>
              <input value={editProductName} onChange={e => setEditProductName(e.target.value)} className="w-full p-3 bg-slate-100 rounded-xl mb-3 font-bold text-sm outline-none uppercase" placeholder="Ürün Adı" />
              <div className="flex gap-2">
                <button onClick={() => setEditingProductId(null)} className="flex-1 p-3 bg-slate-100 rounded-xl font-bold text-xs text-slate-400">İptal</button>
                <button onClick={() => {
                  const oldName = products.find(p => p.id === editingProductId).name;
                  const newName = normalizeName(editProductName);
                  setProducts(products.map(p => p.id === editingProductId ? { ...p, name: newName } : p));
                  setTransactions(transactions.map(t => t.product === oldName ? { ...t, product: newName } : t));
                  setEditingProductId(null);
                }} className="flex-1 p-3 bg-indigo-600 text-white rounded-xl font-black text-xs uppercase text-center">KAYDET</button>
              </div>
            </div>
          </div>
        )}

        {showQuickAdd && (
          <div className="fixed inset-0 bg-slate-900/60 z-[150] flex items-center justify-center p-5 backdrop-blur-sm">
            <div className="bg-white w-full rounded-2xl p-6 animate-in shadow-2xl text-left">
              <h3 className="font-black text-slate-800 mb-4 text-sm uppercase">{showQuickAdd === 'vet' ? 'Yeni Müşteri' : 'Yeni Ürün'}</h3>
              <input autoFocus placeholder="Adı giriniz..." value={newNameInput} onChange={e => setNewNameInput(e.target.value)} className="w-full p-3 bg-slate-100 rounded-xl mb-3 font-bold text-sm outline-none uppercase" />
              <div className="flex gap-2">
                <button onClick={() => setShowQuickAdd(null)} className="flex-1 p-3 bg-slate-100 rounded-xl font-bold text-xs text-slate-400">İptal</button>
                <button onClick={() => {
                  const n = normalizeName(newNameInput); if(!n) return;
                  if(showQuickAdd === 'vet') setVets([...vets, { id:uid(), name:n, phone:'', limit:0 }]);
                  else setProducts([...products, { id:uid(), name:n, stock:0 }]);
                  setShowQuickAdd(null); setNewNameInput('');
                }} className="flex-1 p-3 bg-indigo-600 text-white rounded-xl font-black text-xs uppercase text-center text-center">EKLE</button>
              </div>
            </div>
          </div>
        )}

        {showAddForm && (
          <div className="fixed inset-0 bg-slate-900/60 z-[100] flex items-end backdrop-blur-sm text-left">
            <div className="bg-white w-full rounded-t-3xl p-6 shadow-2xl animate-in slide-in-from-bottom max-h-[90dvh] overflow-y-auto">
              <h3 className="text-lg font-black text-slate-800 mb-5 uppercase tracking-tighter">{editingTransId ? 'İşlemi Güncelle' : 'Cari İşlem Gir'}</h3>
              <div className="space-y-4">
                <div className="grid grid-cols-2 gap-3">
                  <div className="space-y-1">
                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Tarih</label>
                    <input type="date" className="w-full p-3 bg-slate-100 rounded-xl font-bold text-xs outline-none" value={formDate} onChange={e => setFormDate(e.target.value)} />
                  </div>
                  <div className="space-y-1">
                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Tür</label>
                    <select className="w-full p-3 bg-slate-100 rounded-xl font-bold text-xs outline-none text-indigo-600 uppercase" value={formType} onChange={e => setFormType(e.target.value)}>
                        <option value="borclanma">BORÇ (+)</option>
                        <option value="odeme">ÖDEME (-)</option>
                    </select>
                  </div>
                </div>
                <div className="space-y-1">
                  <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Müşteri Seçin</label>
                  <select className="w-full p-3 bg-slate-100 rounded-xl font-bold text-xs outline-none uppercase" value={formVetId} onChange={e => setFormVetId(e.target.value)}>
                    <option value="">Seçiniz</option>
                    {vets.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                  </select>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div className="space-y-1">
                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Ürün Seçin</label>
                    <select className="w-full p-3 bg-slate-100 rounded-xl font-bold text-xs outline-none uppercase" value={formProduct} onChange={e => setFormProduct(e.target.value)}>
                        <option value="">Seçiniz</option>
                        {products.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                    </select>
                  </div>
                  <div className="space-y-1">
                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Miktar</label>
                    <input type="number" className="w-full p-3 bg-slate-100 rounded-xl font-bold text-xs outline-none" placeholder="0" value={formQty} onChange={e => setFormQty(e.target.value)} />
                  </div>
                </div>
                <div className="flex gap-3 pt-4">
                  <button onClick={() => { setShowAddForm(false); setEditingTransId(null); }} className="flex-1 p-4 bg-slate-100 rounded-2xl font-bold text-slate-400 text-sm uppercase">İptal</button>
                  <button onClick={handleTransaction} className="flex-1 p-4 bg-indigo-600 text-white rounded-2xl font-black text-sm uppercase">{editingTransId ? 'Güncelle' : 'Tamamla'}</button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
